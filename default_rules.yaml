# =============================================================================
# bbsplit — default base of retrosynthetic disconnection rules
# =============================================================================
# Each rule describes the TYPE of bond formed when assembling a molecule
# from two building blocks, which we want to break back (retrosynthesis).
#
# Rule fields:
#   name        — human-readable name (unique).
#   smarts      — SMARTS matching the TWO atoms flanking the bond to break.
#                 First atom -> "anchor A", second -> "anchor B".
#                 The bond between these two atoms is the cut point.
#   priority    — higher = higher priority. If several rules match the same
#                 bond, the rule with the highest priority wins.
#   description — short description of the chemistry.
#   enabled     — whether the rule is active by default.
#
# IMPORTANT about SMARTS:
#   * Use !@ (non-ring bond) so rings are not broken.
#   * Exclude neighbouring functional groups via recursive SMARTS $(...),
#     to avoid confusing, e.g., an amide with a plain amine.
# =============================================================================

rules:
  # ---- AMIDE: acyl-N bond (broken between C(=O) and N) -----------------
  - name: amide_CN
    smarts: "[CX3;$([CX3]=[OX1])]!@[NX3]"
    priority: 90
    description: "Amide bond C(=O)-N (acylation of an amine with acid/acyl chloride)."
    enabled: true

  # ---- SULFONAMIDE: S(=O)(=O)-N ----------------------------------------
  - name: sulfonamide_SN
    smarts: "[SX4;$([SX4](=[OX1])(=[OX1]))]!@[NX3]"
    priority: 95
    description: "Sulfonamide bond S(=O)(=O)-N."
    enabled: true

  # ---- UREA: N-C(=O)-N (one C-N is broken) -----------------------------
  - name: urea_CN
    smarts: "[CX3;$([CX3](=[OX1])([NX3])[NX3])]!@[NX3]"
    priority: 85
    description: "C-N bond in a urea N-C(=O)-N."
    enabled: true

  # ---- CARBAMATE: N-C(=O)-O (broken at the N-C(=O) side) ---------------
  - name: carbamate_NC
    smarts: "[NX3]!@[CX3;$([CX3](=[OX1])[OX2])]"
    priority: 88
    description: "Carbamate N-C(=O)-O bond (amine + chloroformate / Boc-type)."
    enabled: true

  # ---- ESTER: C(=O)-O --------------------------------------------------
  - name: ester_CO
    smarts: "[CX3;$([CX3]=[OX1]);!$([CX3][NX3])]!@[OX2H0]"
    priority: 80
    description: "Ester bond C(=O)-O (esterification)."
    enabled: true

  # ---- SECONDARY/TERTIARY AMINE — alkylation: N-C(sp3) -----------------
  # Not an amide/sulfonamide (N not next to C=O or S(=O)2). Breaks N-C(sp3).
  - name: amine_alkylation_NC
    smarts: "[NX3;!$(N-C=O);!$(N=*);!$(N-[SX4](=O)=O)]!@[CX4]"
    priority: 60
    description: "N-alkylation: secondary/tertiary amine to an sp3 carbon (e.g. -NH-CH2-, -NH-CH(R)-)."
    enabled: true

  # ---- ETHER (Williamson / SNAr): O-C(sp3) -----------------------------
  - name: ether_OC
    smarts: "[OX2;H0;!$(O=*);!$(O-C=O)]!@[CX4]"
    priority: 50
    description: "Simple ether bond O-C(sp3) (Williamson synthesis, etc.)."
    enabled: true

  # ---- ARYL ETHER (SNAr / Chan-Lam): O-C(aromatic) ---------------------
  - name: aryl_ether_OC
    smarts: "[OX2;H0;!$(O=*);!$(O-C=O)]!@[c]"
    priority: 48
    description: "Aryl ether O-C(aromatic) (SNAr / Ullmann / Chan-Lam)."
    enabled: true

  # ---- ARYL AMINE (Buchwald / SNAr): N-C(aromatic) ---------------------
  - name: aryl_amine_NC
    smarts: "[NX3;!$(N-C=O);!$(N-[SX4](=O)=O)]!@[c]"
    priority: 55
    description: "Aryl amine bond N-C(aromatic) (Buchwald–Hartwig / SNAr amination)."
    enabled: true

  # ---- THIOETHER / SULFIDE: S-C ---------------------------------------
  - name: thioether_SC
    smarts: "[SX2;!$(S=*)]!@[#6]"
    priority: 45
    description: "Thioether (sulfide) bond S-C (thiol alkylation / SNAr)."
    enabled: false

  # ---- REDUCTIVE AMINATION marker: same as N-C(sp3) but flagged -------
  # (kept separate so users can label provenance; identical cut to alkylation)
  - name: reductive_amination_NC
    smarts: "[NX3;!$(N-C=O);!$(N=*);!$(N-[SX4](=O)=O)]!@[CX4;H1,H2]"
    priority: 58
    description: "Reductive amination product: amine to an sp3 CH/CH2 carbon."
    enabled: false

  # ---- TRIAZOLE (CuAAC click) N-C: azole nitrogen to carbon -----------
  - name: triazole_NC
    smarts: "[nX3]!@[CX4]"
    priority: 47
    description: "Azole/triazole N-alkylation (e.g. CuAAC-derived N-substituent)."
    enabled: false

  # ---- BIARYL (Suzuki / Negishi): Ar-Ar -------------------------------
  - name: biaryl_CC
    smarts: "[c]!@[c]"
    priority: 40
    description: "Biaryl bond C(aromatic)-C(aromatic) (Suzuki/Negishi cross-coupling)."
    enabled: false   # off by default: too many spurious cuts in fused systems

  # ---- ARYL–ALKYNE (Sonogashira): Ar-C#C ------------------------------
  - name: sonogashira_CC
    smarts: "[c]!@[CX2]#[CX2]"
    priority: 42
    description: "Aryl–alkyne bond Ar-C#C (Sonogashira coupling)."
    enabled: false

  # ---- IMINE / HYDRAZONE: C=N -----------------------------------------
  - name: imine_CN
    smarts: "[CX3;$([CX3]=[NX2])]=[NX2]"
    priority: 35
    description: "Imine/hydrazone C=N bond (condensation of carbonyl + amine)."
    enabled: false
