  <text x="22" y="33" font-family="Arial, sans-serif" font-size="13"
        font-weight="700" fill="white" text-anchor="middle">A</text>
  <!-- bond -->
  <line x1="33" y1="28" x2="63" y2="28" stroke="#90a4b8" stroke-width="3"/>
